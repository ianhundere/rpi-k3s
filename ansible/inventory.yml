---
# rpi-k3s cluster inventory.
#
# Real node IPs are NOT stored in git — they are assigned via router DHCP
# reservation on the 192.168.3.x subnet. Replace every `# TODO` placeholder
# below with the actual address before running any playbook.
#
# Authentication is SSH-key based (see ansible_ssh_private_key_file). No
# passwords are stored here.
all:
  children:
    masters:
      hosts:
        kube-master:
          ansible_host: 192.168.3.10 # TODO: set actual master IP
    workers:
      hosts:
        # arm64 Raspberry Pi 4 workers
        kube-worker1:
          ansible_host: 192.168.3.11 # TODO: set actual IP
        kube-worker2:
          ansible_host: 192.168.3.12 # TODO: set actual IP
        kube-worker3:
          ansible_host: 192.168.3.13 # TODO: set actual IP
        # amd64 Beelink Mini S (N5095) — Debian/Ubuntu, needs apparmor
        kube-worker4:
          ansible_host: 192.168.3.14 # TODO: set actual IP
          ansible_user: ianfundere # TODO: amd64 node login user (differs from Pi 'pi' default)
          install_apparmor: true
  vars:
    # Default login user for the Raspberry Pi OS nodes.
    ansible_user: pi # TODO: confirm Pi login user
    ansible_ssh_private_key_file: ~/.ssh/id_rsa # TODO: path to your SSH key
    ansible_python_interpreter: /usr/bin/python3

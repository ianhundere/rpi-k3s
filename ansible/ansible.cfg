[defaults]
# Use the inventory in this directory so commands can be run from ansible/
inventory = inventory.yml
# Pi/x86 nodes are re-flashed during DR — host keys legitimately change
host_key_checking = False
# Don't litter the repo with *.retry files
retry_files_enabled = False
# Silence the "discovered interpreter" warnings; nodes all ship python3
interpreter_python = auto_silent
# Reserved for a future roles/ refactor (see story Dev Notes); harmless if absent
roles_path = roles

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Fewer SSH round-trips per task — meaningful on slow RPi links
pipelining = True

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser
  namespace: filebrowser
  labels:
    app: filebrowser
spec:
  # Migrated to csi-driver-nfs: static-bind to the filebrowser-csi PV.
  storageClassName: ""
  volumeName: filebrowser-csi
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 60Gi

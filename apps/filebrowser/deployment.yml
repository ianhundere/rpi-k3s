apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
  labels:
    app: filebrowser
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        # Renders /config/config.yaml by expanding ${FILEBROWSER_USER} and
        # ${FILEBROWSER_PW} (sourced from the SOPS-encrypted Secret) into
        # the template shipped in the filebrowser-config ConfigMap. See
        # config.yml for the matching Flux-escape rationale.
        - name: render-config
          image: alpine:3.24.1
          command:
            - sh
            - -c
            - |
              set -eu
              apk add --no-cache gettext >/dev/null
              envsubst < /tmpl/config.yaml > /config/config.yaml
              chmod 0644 /config/config.yaml
          env:
            - name: FILEBROWSER_USER
              valueFrom:
                secretKeyRef:
                  name: filebrowser-credentials
                  key: FILEBROWSER_USER
            - name: FILEBROWSER_PW
              valueFrom:
                secretKeyRef:
                  name: filebrowser-credentials
                  key: FILEBROWSER_PW
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmpl
            - name: rendered-config
              mountPath: /config
      containers:
        - name: filebrowser
          # 1.4.0's image runs as a non-root user; run as uid 1000 (owner of the
          # NFS /database and /srv subPaths) so it can write them. /cache is an
          # emptyDir since the NFS cache subPath is root-owned.
          image: gtstef/filebrowser:1.4.0-stable-slim # {"$imagepolicy": "flux-system:filebrowser"}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: FILEBROWSER_CONFIG
              value: /config/config.yaml
            # Silences the early "database file could not be found" warning
            # from backend/common/settings/config.go, which checks this env
            # var before config.yaml is parsed. Must match server.database
            # in config.yml.
            - name: FILEBROWSER_DATABASE
              value: /database/quantum.db
          volumeMounts:
            - name: filebrowser
              mountPath: /srv
              subPath: files
            - name: filebrowser
              mountPath: /database
              subPath: database
            # /cache is ephemeral (previews, speed-test). Keep it off NFS —
            # FileBrowser Quantum 1.4 write-tests it at startup and the NFS
            # subPath was not writable (permission denied -> crashloop).
            - name: cache
              mountPath: /cache
            - name: rendered-config
              mountPath: /config
              readOnly: true
          ports:
            - containerPort: 44301
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 512Mi
      volumes:
        - name: filebrowser
          persistentVolumeClaim:
            claimName: filebrowser
        - name: config-tmpl
          configMap:
            name: filebrowser-config
        - name: rendered-config
          emptyDir: {}
        - name: cache
          emptyDir: {}

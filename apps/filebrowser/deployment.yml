apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: filebrowser
  labels:
    app: filebrowser
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        # Renders /config/config.yaml by expanding ${FILEBROWSER_USER} and
        # ${FILEBROWSER_PW} (sourced from the SOPS-encrypted Secret) into
        # the template shipped in the filebrowser-config ConfigMap. See
        # config.yml for the matching Flux-escape rationale.
        - name: render-config
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              set -eu
              apk add --no-cache gettext >/dev/null
              envsubst < /tmpl/config.yaml > /config/config.yaml
              chmod 0644 /config/config.yaml
          env:
            - name: FILEBROWSER_USER
              valueFrom:
                secretKeyRef:
                  name: filebrowser-credentials
                  key: FILEBROWSER_USER
            - name: FILEBROWSER_PW
              valueFrom:
                secretKeyRef:
                  name: filebrowser-credentials
                  key: FILEBROWSER_PW
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmpl
            - name: rendered-config
              mountPath: /config
      containers:
        - name: filebrowser
          image: gtstef/filebrowser:1.2.4-stable # {"$imagepolicy": "flux-system:filebrowser"}
          imagePullPolicy: IfNotPresent
          env:
            - name: FILEBROWSER_CONFIG
              value: /config/config.yaml
          volumeMounts:
            - name: filebrowser
              mountPath: /srv
              subPath: files
            - name: filebrowser
              mountPath: /database
              subPath: database
            - name: rendered-config
              mountPath: /config
              readOnly: true
          ports:
            - containerPort: 44301
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 512Mi
      volumes:
        - name: filebrowser
          persistentVolumeClaim:
            claimName: filebrowser
        - name: config-tmpl
          configMap:
            name: filebrowser-config
        - name: rendered-config
          emptyDir: {}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser-http-redirect
  namespace: filebrowser
spec:
  hostnames:
  - ${FILEBROWSER_HOST}
  parentRefs:
  - name: internal-gateway
    namespace: envoy-gateway-system
    sectionName: filebrowser-internal-http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser-https
  namespace: filebrowser
spec:
  hostnames:
  - ${FILEBROWSER_HOST}
  parentRefs:
  - name: internal-gateway
    namespace: envoy-gateway-system
    sectionName: filebrowser-internal-https
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    # NOTE: deliberately NO Strict-Transport-Security here. filebrowser is
    # served with an internal-CA cert that browsers don't trust — HSTS would
    # prevent the click-through bypass (Firefox shows "can't add an
    # exception" instead of "Advanced → Proceed"), and the user has opted
    # not to install the internal CA root on personal devices.
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: X-Frame-Options
          value: "DENY"
        - name: X-Content-Type-Options
          value: "nosniff"
        - name: Referrer-Policy
          value: "strict-origin-when-cross-origin"
    backendRefs:
    - name: filebrowser
      port: 44301
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: filebrowser-client-traffic
  namespace: envoy-gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: internal-gateway
    sectionName: filebrowser-internal-https
  timeout:
    http:
      requestReceivedTimeout: 60s

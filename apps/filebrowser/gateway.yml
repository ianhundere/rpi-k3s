apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser-http-redirect
  namespace: filebrowser
spec:
  hostnames:
  - ${FILEBROWSER_HOST}
  parentRefs:
  - name: shared-gateway
    namespace: envoy-gateway-system
    sectionName: share-clusterian-pw-http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: filebrowser-https
  namespace: filebrowser
spec:
  hostnames:
  - ${FILEBROWSER_HOST}
  parentRefs:
  - name: shared-gateway
    namespace: envoy-gateway-system
    sectionName: share-clusterian-pw-https
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains; preload"
        - name: X-Frame-Options
          value: "DENY"
        - name: X-Content-Type-Options
          value: "nosniff"
        - name: Referrer-Policy
          value: "strict-origin-when-cross-origin"
    backendRefs:
    - name: filebrowser
      port: 44301
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: filebrowser-client-traffic
  namespace: envoy-gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: shared-gateway
    sectionName: share-clusterian-pw-https
  timeout:
    http:
      requestReceivedTimeout: 60s

# Static PV/PVC for the music library. Pinned to /volume2/music. RWX because
# it's mounted concurrently (via subPaths) by lidarr and soulseek.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: music-data
  labels:
    app: media
spec:
  capacity:
    storage: 80Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=3
    - proto=tcp
    - rsize=1048576
    - wsize=1048576
    - noatime
    - nodiratime
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: ${NFS_IP}#volume2/music##
    volumeAttributes:
      server: ${NFS_IP}
      share: /volume2/music
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: music-data
  namespace: media
  labels:
    app: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: music-data
  resources:
    requests:
      storage: 80Gi

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: lidarr-search-timeout
  namespace: media
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: media-tools
  timeout:
    http:
      requestTimeout: 180s
      connectionIdleTimeout: 300s

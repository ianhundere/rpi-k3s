apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: soulseek
  name: soulseek
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: soulseek
  template:
    metadata:
      labels:
        app: soulseek
    spec:
      hostname: soulseek
      enableServiceLinks: false
      initContainers:
        - name: sysctl-setup
          image: busybox
          command:
            [
              'sh',
              '-c',
              'sysctl -w net.ipv4.conf.all.rp_filter=2 && sysctl -w net.ipv6.conf.all.disable_ipv6=1 && sysctl -w net.ipv4.ip_forward=1',
            ]
          securityContext:
            privileged: true
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1 # {"$imagepolicy": "flux-system:gluetun"}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            privileged: true
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: soulseek
                  key: vpn-key
            - name: SERVER_COUNTRIES
              value: 'Finland'
            - name: VPN_PORT_FORWARDING
              value: 'on'
            - name: FIREWALL
              value: 'yes'
            - name: HEALTH_TARGET_ADDRESSES
              value: 'cloudflare.com:443,github.com:443'
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: '10.42.0.0/16,10.43.0.0/16'
          volumeMounts:
            - mountPath: /dev/net/tun
              name: tun-device
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 512Mi
        - name: slskd
          image: slskd/slskd:0.24.5 # {"$imagepolicy": "flux-system:slskd"}
          env:
            - name: SLSKD_REMOTE_CONFIGURATION
              value: 'true'
            - name: SLSKD_HTTP_PORT
              value: '5030'
            - name: SLSKD_SLSK_LISTEN_PORT
              value: '50300'
            - name: SLSKD_NO_HTTPS
              value: 'true'
            - name: SLSKD_URL_BASE
              value: '/soulseek'
            - name: SLSKD_DOWNLOADS_DIR
              value: '/downloads'
            - name: SLSKD_SHARED_DIR
              value: '[Music]/music'
            - name: SLSKD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: soulseek
                  key: api-key
          ports:
            - containerPort: 5030
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: media-config
              mountPath: /app
              subPath: slskd/config
            - name: media-data
              mountPath: /downloads
              subPath: downloads/soulseek
            - name: music-data
              mountPath: /music
      dnsPolicy: None
      dnsConfig:
        nameservers: ['1.1.1.1', '1.0.0.1']
      volumes:
        - name: media-config
          persistentVolumeClaim:
            claimName: media-config
        - name: media-data
          persistentVolumeClaim:
            claimName: media-data
        - name: music-data
          persistentVolumeClaim:
            claimName: music-data
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice
      nodeSelector:
        kubernetes.io/arch: arm64

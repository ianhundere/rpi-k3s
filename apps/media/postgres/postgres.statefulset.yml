apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: media-postgres
  namespace: media
  labels:
    app: media-postgres
spec:
  serviceName: media-postgres
  replicas: 1
  selector:
    matchLabels:
      app: media-postgres
  template:
    metadata:
      labels:
        app: media-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: media
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: media-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "media"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "media"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 512Mi
      volumes:
        - name: init-scripts
          configMap:
            name: media-postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nfs-rpik3s
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: media-postgres
  namespace: media
  labels:
    app: media-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: media-postgres
  clusterIP: None

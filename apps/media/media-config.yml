apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-config
  namespace: media
  labels:
    app: media
spec:
  # Shared config volume; mounted concurrently (via subPaths) by all media
  # apps across multiple nodes, so it must be ReadWriteMany. Lives at
  # /volume3/rpi-k3s/media/media-config.
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-rpik3s
  resources:
    requests:
      storage: 400Gi

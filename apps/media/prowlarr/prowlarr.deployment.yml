apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: prowlarr
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      hostname: prowlarr
      enableServiceLinks: false
      initContainers:
      - name: sysctl-setup
        image: busybox
        command: ['sh', '-c', 'sysctl -w net.ipv4.conf.all.rp_filter=2 && sysctl -w net.ipv6.conf.all.disable_ipv6=1']
        securityContext:
          privileged: true
      containers:
      - name: gluetun
        image: qmcgaw/gluetun:v3.41.1 # {"$imagepolicy": "flux-system:gluetun"}
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
          privileged: true
        env:
        - name: VPN_SERVICE_PROVIDER
          value: protonvpn
        - name: VPN_TYPE
          value: wireguard
        - name: WIREGUARD_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: prowlarr
              key: key
        - name: SERVER_COUNTRIES
          value: 'Hungary'
        - name: VPN_PORT_FORWARDING
          value: 'off'
        - name: FIREWALL
          value: 'yes'
        - name: HEALTH_TARGET_ADDRESSES
          value: 'cloudflare.com:443,github.com:443'
        - name: DNS_KEEP_NAMESERVER
          value: 'on'
        - name: FIREWALL_OUTBOUND_SUBNETS
          value: '10.42.0.0/16,10.43.0.0/16'
        volumeMounts:
        - mountPath: /dev/net/tun
          name: tun-device
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 512Mi
      - name: flaresolverr
        image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
        env:
        - name: LOG_LEVEL
          value: info
        - name: TZ
          value: Etc/UTC
        ports:
        - containerPort: 8191
          name: flaresolverr
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 512Mi
      - name: prowlarr
        image: linuxserver/prowlarr:2.3.5 # {"$imagepolicy": "flux-system:prowlarr"}
        imagePullPolicy: IfNotPresent
        env:
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        - name: PROWLARR__POSTGRES__HOST
          value: media-postgres
        - name: PROWLARR__POSTGRES__PORT
          value: '5432'
        - name: PROWLARR__POSTGRES__USER
          value: media
        - name: PROWLARR__POSTGRES__PASSWORD
          valueFrom:
            secretKeyRef:
              name: media-postgres
              key: password
        - name: PROWLARR__POSTGRES__MAINDB
          value: prowlarr-main
        - name: PROWLARR__POSTGRES__LOGDB
          value: prowlarr-log
        ports:
        - containerPort: 9696
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            memory: 512Mi
        volumeMounts:
        - mountPath: /config
          name: media-config
          subPath: prowlarr
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      volumes:
      - name: media-config
        persistentVolumeClaim:
          claimName: media-config
      - name: tun-device
        hostPath:
          path: /dev/net/tun
          type: CharDevice

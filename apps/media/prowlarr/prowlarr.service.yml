apiVersion: v1
kind: Service
metadata:
  labels:
    app: prowlarr
  name: prowlarr
  namespace: media
  annotations:
    tailscale.com/hostname: "prowlarr"
    tailscale.com/expose: "true"
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 9696
  selector:
    app: prowlarr
  type: ClusterIP

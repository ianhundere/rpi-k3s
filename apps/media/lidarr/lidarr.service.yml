apiVersion: v1
kind: Service
metadata:
  labels:
    app: lidarr
  name: lidarr
  namespace: media
  annotations:
    tailscale.com/hostname: "lidarr"
    tailscale.com/expose: "true"
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8686
  selector:
    app: lidarr
  type: ClusterIP

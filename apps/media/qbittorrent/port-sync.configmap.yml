apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-port-sync
  namespace: media
data:
  sync.sh: |
    #!/bin/sh
    set -u
    PORT_FILE="/gluetun/forwarded_port"
    API_URL="http://127.0.0.1:9091/api/v2/app/setPreferences"
    LAST_PORT=""
    echo "[port-sync] starting (qbittorrent)"
    while true; do
      if [ -f "$PORT_FILE" ]; then
        PORT=$(tr -d '[:space:]' < "$PORT_FILE" 2>/dev/null || true)
        if [ -n "$PORT" ] && [ "$PORT" != "$LAST_PORT" ]; then
          echo "[port-sync] syncing qbittorrent listen_port=$PORT"
          if curl -fsS -X POST \
               --data-urlencode "json={\"listen_port\":$PORT,\"random_port\":false,\"upnp\":false}" \
               "$API_URL" > /dev/null; then
            LAST_PORT="$PORT"
            echo "[port-sync] ok"
          else
            echo "[port-sync] qbittorrent api call failed, retrying (ensure 'Bypass authentication for clients on localhost' is enabled in qBit Web UI settings)"
          fi
        fi
      fi
      sleep 30
    done

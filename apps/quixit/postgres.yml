apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quixit-postgres
  namespace: quixit
  labels:
    app: quixit-postgres
spec:
  serviceName: quixit-postgres
  replicas: 1
  selector:
    matchLabels:
      app: quixit-postgres
  template:
    metadata:
      labels:
        app: quixit-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: quixit
            - name: POSTGRES_DB
              value: quixit
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quixit-credentials
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "quixit"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "quixit"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: nfs-rpik3s
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: quixit-postgres
  namespace: quixit
  labels:
    app: quixit-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: quixit-postgres
  clusterIP: None

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quixit-postgres
  namespace: quixit
  labels:
    app: quixit-postgres
spec:
  accessModes:
    - ReadWriteOnce
  # Migrated to csi-driver-nfs: static-bind to the quixit-postgres-csi PV.
  storageClassName: ""
  volumeName: quixit-postgres-csi
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quixit-postgres
  namespace: quixit
  labels:
    app: quixit-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: quixit-postgres
  template:
    metadata:
      labels:
        app: quixit-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: quixit
            - name: POSTGRES_DB
              value: quixit
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quixit-credentials
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "quixit"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "quixit"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 1Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: quixit-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: quixit-postgres
  namespace: quixit
  labels:
    app: quixit-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: quixit-postgres
  clusterIP: None

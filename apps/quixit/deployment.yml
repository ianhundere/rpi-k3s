apiVersion: apps/v1
kind: Deployment
metadata:
  name: quixit
  namespace: quixit
  labels:
    app: quixit
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: quixit
  template:
    metadata:
      labels:
        app: quixit
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h quixit-postgres -U quixit; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: quixit-credentials
                  key: db-password
      containers:
        - name: quixit
          image: ghcr.io/ianhundere/quixit:0.9.1 # {"$imagepolicy": "flux-system:quixit"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: quixit-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quixit-credentials
                  key: db-password
            - name: DATABASE_URL
              value: "postgres://quixit:$(DB_PASSWORD)@quixit-postgres:5432/quixit?sslmode=disable"
            - name: QUIXIT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: quixit-credentials
                  key: session-secret
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quixit-credentials
                  key: smtp-password
                  optional: true
          volumeMounts:
            - name: quixit-storage
              mountPath: /var/quixit
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: quixit-storage
          persistentVolumeClaim:
            claimName: quixit-storage

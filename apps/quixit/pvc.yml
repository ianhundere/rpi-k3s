apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quixit-storage
  namespace: quixit
  labels:
    app: quixit
spec:
  # Migrated to csi-driver-nfs: static-bind to the quixit-storage-csi PV.
  storageClassName: ""
  volumeName: quixit-storage-csi
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 60Gi

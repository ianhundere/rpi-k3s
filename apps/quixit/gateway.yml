apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quixit-http-redirect
  namespace: quixit
spec:
  hostnames:
  - ${QUIXIT_HOST}
  parentRefs:
  - name: shared-gateway
    namespace: envoy-gateway-system
    sectionName: quixit-us-http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quixit-https
  namespace: quixit
spec:
  hostnames:
  - ${QUIXIT_HOST}
  parentRefs:
  - name: shared-gateway
    namespace: envoy-gateway-system
    sectionName: quixit-us-https
  rules:
  # SSE long-poll: Envoy's default route timeout (15s) was killing the
  # /api/sse stream before even the first keepalive (20s). timeouts.request:
  # "0s" disables the request timeout for this path only — all other
  # requests keep the default. Note: the BackendTrafficPolicy below still
  # applies connectionIdleTimeout: 600s / maxConnectionDuration: 600s to
  # this route, so the stream is "long but not infinite" — capped at 10min.
  # Client auto-reconnects on drop.
  - matches:
    - path:
        type: PathPrefix
        value: /api/sse
    timeouts:
      request: "0s"
      backendRequest: "0s"
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains; preload"
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Credentials
          value: "true"
        - name: Referrer-Policy
          value: "strict-origin-when-cross-origin"
        - name: X-Content-Type-Options
          value: "nosniff"
    backendRefs:
    - name: quixit
      port: 8080
  # Chat live-stream SSE: identical failure mode to /api/sse above. This route
  # was missed when the IRC chat bridge shipped its own stream endpoint, so
  # Envoy's default 15s route timeout killed /api/chat/stream before the 20s
  # keepalive could fire — every connection died at ~15s, forcing a reconnect
  # storm and dropping live cross-device message delivery (messages persisted
  # to the DB but never fanned out live). timeouts: 0s mirrors /api/sse;
  # BackendTrafficPolicy below still caps the connection at 600s.
  # NOTE: every server-sent-events / long-poll route MUST be listed here.
  # Current SSE/long-poll routes: /api/sse, /api/chat/stream.
  - matches:
    - path:
        type: PathPrefix
        value: /api/chat/stream
    timeouts:
      request: "0s"
      backendRequest: "0s"
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains; preload"
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Credentials
          value: "true"
        - name: Referrer-Policy
          value: "strict-origin-when-cross-origin"
        - name: X-Content-Type-Options
          value: "nosniff"
    backendRefs:
    - name: quixit
      port: 8080
  # Long-tail downloads: Envoy's 15s default route timeout cuts ZIP
  # downloads mid-stream for users on modest connections (~12Mbps user
  # reported a "failed network error" at 22MB into a sample-pack
  # download on 2026-05-14 — math: 22MB / 15s = 1.5MB/s = ~12Mbps).
  # Same fix pattern as the SSE rule above: timeouts: 0s removes the
  # per-request cap; BackendTrafficPolicy still bounds the underlying
  # connection at 600s, so downloads are "long but not infinite."
  # PathPrefix covers:
  #   GET /api/cycles/:id/sample-pack/download
  #   GET /api/cycles/:id/song-pack/download
  # Short JSON endpoints under /api/cycles/ (list, get, status) are
  # also matched but complete in ms regardless of timeout, so the
  # broader prefix is harmless.
  - matches:
    - path:
        type: PathPrefix
        value: /api/cycles/
    timeouts:
      request: "0s"
      backendRequest: "0s"
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains; preload"
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Credentials
          value: "true"
        - name: Referrer-Policy
          value: "strict-origin-when-cross-origin"
        - name: X-Content-Type-Options
          value: "nosniff"
    backendRefs:
    - name: quixit
      port: 8080
  # Legacy cycle archive playback / file serve. Same 15s-cuts-mid-stream
  # concern as the cycles/*-pack/download routes; http.ServeFile with
  # Range support means seeks restart the timer but a sequential play
  # of a long track on a slow connection would also be cut.
  - matches:
    - path:
        type: PathPrefix
        value: /api/legacy/
    timeouts:
      request: "0s"
      backendRequest: "0s"
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains; preload"
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Credentials
          value: "true"
        - name: Referrer-Policy
          value: "strict-origin-when-cross-origin"
        - name: X-Content-Type-Options
          value: "nosniff"
    backendRefs:
    - name: quixit
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: ResponseHeaderModifier
      responseHeaderModifier:
        add:
        - name: Strict-Transport-Security
          value: "max-age=31536000; includeSubDomains; preload"
        - name: X-Frame-Options
          value: "DENY"
        - name: X-Content-Type-Options
          value: "nosniff"
        - name: Referrer-Policy
          value: "strict-origin-when-cross-origin"
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Methods
          value: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
        - name: Access-Control-Allow-Headers
          value: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
        - name: Permissions-Policy
          value: "camera=(), microphone=(), geolocation=()"
        - name: Content-Security-Policy
          # Google Fonts (googleapis stylesheet + gstatic font files) and the
          # Workbox service-worker runtime (storage.googleapis.com CDN, loaded
          # via importScripts in sw.js) are narrowly allowlisted — the app has
          # always loaded these; the strict default-src 'self' just wasn't
          # updated to match, so both were CSP-blocked in the console.
          value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://storage.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'"
    backendRefs:
    - name: quixit
      port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: quixit-client-traffic
  namespace: envoy-gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: shared-gateway
    sectionName: quixit-us-https
  timeout:
    http:
      requestReceivedTimeout: 300s
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: quixit-backend-traffic
  namespace: quixit
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: quixit-https
  timeout:
    http:
      connectionIdleTimeout: 600s
      maxConnectionDuration: 600s
  # Auto maintenance page: when the backend is unreachable (node drain,
  # postgres down, rollout), Envoy's own 502/503/504 gets this body instead
  # of a blank error. Self-clearing — healthy responses are untouched.
  responseOverride:
  - match:
      statusCodes:
      - value: 502
      - value: 503
      - value: 504
    response:
      contentType: text/html
      body:
        type: Inline
        inline: |
          <!doctype html><html lang="en"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <meta http-equiv="refresh" content="60">
          <title>quixit &mdash; maintenance</title>
          <style>body{font-family:system-ui,sans-serif;background:#111;color:#eee;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}main{max-width:28rem;padding:2rem}h1{font-size:1.4rem;font-weight:600}p{color:#aaa;line-height:1.5}</style>
          </head><body><main>
          <h1>&#128295; quixit is undergoing maintenance</h1>
          <p>We&rsquo;re doing some quick infrastructure work. The site will be back shortly &mdash; this page refreshes itself every minute.</p>
          </main></body></html>

apiVersion: v1
kind: ConfigMap
metadata:
  name: quixit-config
  namespace: quixit
  labels:
    app: quixit
data:
  APP_ENV: "production"
  APP_PORT: "8080"

  # Storage
  STORAGE_ROOT: "/var/quixit"
  LEGACY_ARCHIVE_ROOT: "/var/quixit/files/quixit"

  # tufkin OAuth 2.1
  # Issuer must match JWT iss claim (external URL set in tufkin configmap)
  TUFKIN_ISSUER: "https://${TUFKIN_HOST}"
  TUFKIN_CLIENT_ID: "${TUFKIN_CLIENT_ID}"
  # Server-to-server: use internal cluster DNS (no external DNS needed)
  TUFKIN_JWKS_URL: "http://tufkin.tufkin.svc.cluster.local:8080/.well-known/jwks.json"
  TUFKIN_TOKEN_ENDPOINT: "http://tufkin.tufkin.svc.cluster.local:8080/api/oauth/token"
  TUFKIN_USERINFO_ENDPOINT: "http://tufkin.tufkin.svc.cluster.local:8080/api/userinfo"
  # Server-to-server: base URL for registration proxy endpoints
  TUFKIN_BASE_URL: "http://tufkin.tufkin.svc.cluster.local:8080"
  # Browser-facing: must use external URL (user's browser redirects here)
  TUFKIN_AUTHORIZATION_ENDPOINT: "https://${TUFKIN_HOST}/api/oauth/authorize"

  # OAuth callback
  QUIXIT_OAUTH_REDIRECT_URI: "https://${QUIXIT_HOST}/auth/callback"
  QUIXIT_FRONTEND_URL: "https://${QUIXIT_HOST}"

  # CORS
  QUIXIT_CORS_ORIGINS: "https://${QUIXIT_HOST}"

  # Session
  QUIXIT_SESSION_EXPIRY: "3600"

  # Database connection pool
  DB_MAX_CONNS: "25"
  DB_MIN_CONNS: "5"

  # SMTP Email (Story 9.7) — disabled until Resend API key is configured
  SMTP_ENABLED: "false"
  SMTP_HOST: "smtp.resend.com"
  SMTP_PORT: "587"
  SMTP_USER: "resend"
  SMTP_FROM: "noreply@quixit.us"

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tufkin-postgres-pvc
  namespace: tufkin
spec:
  accessModes:
    - ReadWriteOnce
  # Migrated to csi-driver-nfs: static-bind to the tufkin-postgres-csi PV.
  storageClassName: ""
  volumeName: tufkin-postgres-csi
  resources:
    requests:
      storage: 1Gi

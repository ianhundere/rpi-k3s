apiVersion: apps/v1
kind: Deployment
metadata:
  name: tufkin
  namespace: tufkin
  labels:
    app: tufkin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tufkin
  template:
    metadata:
      labels:
        app: tufkin
    spec:
      # Container runs as uid/gid 1000 (tufkin). fsGroup lets the non-root
      # process read the root-owned signing-key secret via group ownership.
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: migrate
          image: ghcr.io/ianhundere/tufkin:0.22.1 # {"$imagepolicy": "flux-system:tufkin"}
          command: ["/usr/local/bin/migrate"]
          args:
            - "-path"
            - "/app/migrations"
            - "-database"
            - "postgresql://$(TUFKIN_DB_USER):$(TUFKIN_DB_PASSWORD)@$(TUFKIN_DB_HOST):$(TUFKIN_DB_PORT)/$(TUFKIN_DB_NAME)?sslmode=$(TUFKIN_DB_SSLMODE)"
            - "up"
          envFrom:
            - configMapRef:
                name: tufkin-config
          env:
            - name: TUFKIN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tufkin-credentials
                  key: db-password
      containers:
        - name: tufkin
          image: ghcr.io/ianhundere/tufkin:0.22.1 # {"$imagepolicy": "flux-system:tufkin"}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: tufkin-config
          env:
            - name: TUFKIN_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tufkin-credentials
                  key: db-password
            - name: TUFKIN_JWT_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: tufkin-credentials
                  key: jwt-session-secret
            - name: TUFKIN_SECURITY_IP_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: tufkin-credentials
                  key: ip-hash-salt
            - name: TUFKIN_EMAIL_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tufkin-credentials
                  key: smtp-password
            - name: TUFKIN_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tufkin-credentials
                  key: admin-token
            - name: TUFKIN_KEY_FILE
              value: /etc/tufkin/keys/signing-key.pem
          volumeMounts:
            - name: signing-key
              mountPath: /etc/tufkin/keys
              readOnly: true
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              # Convention: mem limit == request (OOM protection), no CPU limit
              # (CFS throttling hurts on RPi).
              memory: "256Mi"
      volumes:
        - name: signing-key
          secret:
            secretName: tufkin-credentials
            defaultMode: 0440 # root:fsGroup(1000) group-read; non-root app can read
            items:
              - key: signing-key.pem
                path: signing-key.pem

apiVersion: v1
kind: Secret
metadata:
  name: tufkin-credentials
  namespace: tufkin
type: Opaque
stringData:
  db-password: ${TUFKIN_DB_PASSWORD}
  jwt-session-secret: ${TUFKIN_JWT_SESSION_SECRET}
  ip-hash-salt: ${TUFKIN_IP_HASH_SALT}
  smtp-password: ${TUFKIN_SMTP_PASSWORD}
  admin-token: ${TUFKIN_ADMIN_TOKEN}
data:
  # ES256 signing key (PKCS#8 PEM, base64) for FileProvider — persists across
  # restarts so deploys no longer invalidate outstanding tokens/sessions.
  signing-key.pem: ${TUFKIN_SIGNING_KEY_B64}

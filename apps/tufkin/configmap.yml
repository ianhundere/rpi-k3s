apiVersion: v1
kind: ConfigMap
metadata:
  name: tufkin-config
  namespace: tufkin
data:
  TUFKIN_SERVER_PORT: "8080"
  TUFKIN_SERVER_HOST: "0.0.0.0"
  TUFKIN_DB_HOST: "tufkin-postgres"
  TUFKIN_DB_PORT: "5432"
  TUFKIN_DB_USER: "tufkin"
  TUFKIN_DB_NAME: "tufkin"
  TUFKIN_DB_SSLMODE: "disable"
  TUFKIN_OAUTH_ISSUER: "https://${TUFKIN_HOST}"
  TUFKIN_ATTEST_PROVIDER: "dev"
  TUFKIN_LOG_LEVEL: "info"
  TUFKIN_LOG_FORMAT: "json"
  TUFKIN_SECURITY_CORS_ALLOWED_ORIGINS: "https://${TUFKIN_HOST},https://${QUIXIT_HOST}"

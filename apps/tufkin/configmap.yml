apiVersion: v1
kind: ConfigMap
metadata:
  name: tufkin-config
  namespace: tufkin
data:
  TUFKIN_SERVER_PORT: "8080"
  TUFKIN_SERVER_HOST: "0.0.0.0"
  TUFKIN_DB_HOST: "tufkin-postgres"
  TUFKIN_DB_PORT: "5432"
  TUFKIN_DB_USER: "tufkin"
  TUFKIN_DB_NAME: "tufkin"
  TUFKIN_DB_SSLMODE: "disable"
  TUFKIN_OAUTH_ISSUER: "https://${TUFKIN_HOST}"
  TUFKIN_ATTEST_PROVIDER: "dev"
  TUFKIN_LOG_LEVEL: "info"
  TUFKIN_LOG_FORMAT: "json"
  TUFKIN_SECURITY_CORS_ALLOWED_ORIGINS: "https://${TUFKIN_HOST},https://${QUIXIT_HOST}"
  TUFKIN_REGISTRATION_ENABLED: "true"
  TUFKIN_REGISTRATION_OTP_TTL: "10m"
  TUFKIN_REGISTRATION_MAX_ATTEMPTS: "5"
  TUFKIN_REGISTRATION_TOKEN_LIFETIME: "10m"
  TUFKIN_REGISTRATION_RATE_LIMIT_PER_MINUTE: "10"
  TUFKIN_EMAIL_ENABLED: "true"
  TUFKIN_EMAIL_FROM: "noreply@clusterian.pw"
  TUFKIN_EMAIL_SMTP_HOST: "smtp.resend.com"
  TUFKIN_EMAIL_SMTP_PORT: "587"
  TUFKIN_EMAIL_SMTP_USERNAME: "resend"

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: irc
  namespace: irc
spec:
  accessModes:
    - ReadWriteOnce
  # Migrated to csi-driver-nfs: static-bind to the irc-csi PV (storageClassName ""
  # disables dynamic provisioning; volumeName pins the exact PV).
  storageClassName: ""
  volumeName: irc-csi
  resources:
    requests:
      storage: 1Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: soju
  namespace: irc
  labels:
    app: soju
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: soju
  template:
    metadata:
      labels:
        app: soju
    spec:
      securityContext:
        fsGroup: 1000
      # Shared PID namespace so the cert-reloader sidecar can signal soju.
      # soju reloads its TLS cert/key on SIGHUP (soju(1)); the sidecar sends
      # one whenever cert-manager rotates soju-tls, avoiding the stale-cert-in-
      # memory bug that expires the served cert ~60 days after a pod start.
      shareProcessNamespace: true
      initContainers:
        - name: remove-socket
          image: busybox:1.38
          command: ['sh', '-c', 'rm -f /var/lib/soju/control.sock']
          volumeMounts:
            - name: irc
              mountPath: /var/lib/soju
              subPath: soju
      containers:
        - name: soju
          image: codeberg.org/emersion/soju:latest
          args: ['-config', '/etc/soju/config']
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          ports:
            - name: ircs
              containerPort: 6697
            - name: ident
              containerPort: 113
          volumeMounts:
            - name: irc
              mountPath: /var/lib/soju
              subPath: soju
            - name: soju
              mountPath: /etc/soju
            - name: tls
              mountPath: /etc/soju/tls
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 6697
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6697
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 128Mi
        # Watches the mounted soju-tls secret and SIGHUPs soju on rotation so
        # it re-reads the cert without a restart (zero dropped IRC sessions).
        # Runs as UID 1000 (same as soju) so it has permission to signal it.
        - name: cert-reloader
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              crt=/etc/soju/tls/tls.crt
              # The projected-secret ..data symlink can lag container start, so
              # retry until the first hash is non-empty before baselining —
              # otherwise an empty baseline triggers one spurious reload later.
              last=""; n=0
              while [ -z "$last" ] && [ "$n" -lt 30 ]; do
                last=$(sha256sum "$crt" 2>/dev/null | cut -d' ' -f1)
                [ -z "$last" ] && { n=$((n + 1)); sleep 1; }
              done
              # $$ escapes the brace-form var so Flux postBuild substitution
              # (substituteFrom cluster-vars) leaves ${last} for the shell.
              echo "cert-reloader: watching $crt (baseline $${last:-none})"
              while true; do
                sleep 3600
                cur=$(sha256sum "$crt" 2>/dev/null | cut -d' ' -f1)
                [ -z "$cur" ] && continue
                [ "$cur" = "$last" ] && continue
                pid=$(pidof soju)
                if [ -n "$pid" ]; then
                  kill -HUP $pid && \
                    echo "cert-reloader: cert changed; sent SIGHUP to soju (pid $pid)" && \
                    last=$cur
                else
                  echo "cert-reloader: cert changed but soju not found; retrying"
                fi
              done
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tls
              mountPath: /etc/soju/tls
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 16Mi
      volumes:
        - name: irc
          persistentVolumeClaim:
            claimName: irc
        - name: soju
          configMap:
            name: soju
        - name: tls
          secret:
            secretName: soju-tls

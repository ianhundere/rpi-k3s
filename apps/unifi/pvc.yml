apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: unifi
  name: unifi
  labels:
    app: unifi-controller
    storage.k8s.io/name: nfs
spec:
  # Migrated to csi-driver-nfs: static-bind to the unifi-csi PV.
  storageClassName: ""
  volumeName: unifi-csi
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

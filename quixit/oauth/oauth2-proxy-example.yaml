apiVersion: apps/v1
kind: Deployment
metadata:
 labels:
  k8s-app: oauth2-proxy
 name: oauth2-proxy
 namespace: rekor-system
spec:
 replicas: 1
 selector:
  matchLabels:
   k8s-app: oauth2-proxy
 template:
  metadata:
   labels:
    k8s-app: oauth2-proxy
  spec:
   containers:
    - args:
       - --provider=oidc
       - --email-domain=*
       - --provider-display-name="SWA Ping"
       - --client-id=p502670
       - --client-secret-file=/dev/null
       # - --oidc-extra-audience="aud://sso.fed.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com/arcsattest/p502670"
       - --upstream=file:///dev/null
       - --http-address=0.0.0.0:4180
       - --oidc-issuer-url=https://sso.fed.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com
       - --redirect-url=https://rekor-search.arcs.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com/oauth2/callback
       - --oidc-jwks-url=https://sso.fed.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com/pf/JWKS
       - --login-url=https://sso.fed.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com/as/authorization.oauth2
       - --redeem-url=https://sso.fed.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com/as/token.oauth2?aud=aud://sso.fed.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com/arcsattest/p502670
       - --skip-oidc-discovery=true
       - --whitelist-domain=".arcs.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com"
       - --whitelist-domain=".svc.cluster.local"
       - --whitelist-domain="*"
       - --cookie-domain=".arcs.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com"
       - --cookie-domain=".svc.cluster.local"
       - --cookie-domain="*"
       - --code-challenge-method=S256
       - --oidc-email-claim=sub
       - --pass-access-token=true
      #- --allowed-group="ARCS_Admin_S"
      env:
       - name: OAUTH2_PROXY_SSL_INSECURE_SKIP_VERIFY
         value: 'true'
       - name: OAUTH2_PROXY_COOKIE_SECRET
         value: dXc5SGc4ZEF2emNBK2NUemp2WmVHUT09
      image: quay.io/oauth2-proxy/oauth2-proxy:latest
      imagePullPolicy: Always
      name: oauth2-proxy
      ports:
       - containerPort: 4180
         protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
 labels:
  k8s-app: oauth2-proxy
 name: oauth2-proxy
 namespace: rekor-system
spec:
 ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 4180
 selector:
  k8s-app: oauth2-proxy
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
 name: oauth2-proxy
 namespace: rekor-system
spec:
 ingressClassName: nginx
 rules:
  - host: rekor-search.arcs.{{ .Values.search.ssoEnvironment }}.aws.swacorp.com
    http:
     paths:
      - path: /oauth2
        pathType: Prefix
        backend:
         service:
          name: oauth2-proxy
          port:
           number: 80

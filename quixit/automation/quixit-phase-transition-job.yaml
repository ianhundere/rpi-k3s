apiVersion: batch/v1
kind: Job
metadata:
 name: quixit-manual-phase-transition
 namespace: quixit
spec:
 template:
  spec:
   containers:
    - name: phase-transition
      image: curlimages/curl:latest
      volumeMounts:
       - name: filebrowser-data
         mountPath: /data
      command:
       - /bin/sh
       - -c
       - |
        # get the current quixit number
        if [ -f "/data/quixit/current_quixit_number.txt" ]; then
          QUIXIT_NUMBER=$(cat /data/quixit/current_quixit_number.txt)
        else
          # find the highest existing number
          HIGHEST=$(find /data/quixit -maxdepth 1 -type d -name "quixit-*" | sed 's/.*quixit-//' | sort -n | tail -1)
          if [ ! -z "$HIGHEST" ]; then
            QUIXIT_NUMBER=$HIGHEST
          else
            QUIXIT_NUMBER=1
          fi
        fi
        
        QUIXIT_FOLDER="quixit-${QUIXIT_NUMBER}"
        SAMPLES_FOLDER="${QUIXIT_FOLDER}/samples"
        SONGS_FOLDER="${QUIXIT_FOLDER}/songs"
        PHASE="${PHASE:-samples_to_songs}"  # Default to samples_to_songs if not specified
        
        if [ "$PHASE" = "samples_to_songs" ]; then
          # remove old phase file
          rm -f /data/quixit/${QUIXIT_FOLDER}/QUIXIT_HAS_BEGUN_UPLOAD_SAMPLES_*.txt
          
          # create sample pack zip
          cd /data/quixit
          zip -r "${QUIXIT_FOLDER}/SAMPLE_PACK.zip" "${SAMPLES_FOLDER}"
          
          # create info file for songs phase with descriptive name
          SONG_DEADLINE=$(date -d "+12 days" +%Y-%m-%d)
          echo "Sample phase complete. Download SAMPLE_PACK.zip and create your song. Upload your finished song to the songs folder. Deadline: ${SONG_DEADLINE}" > "/data/quixit/${QUIXIT_FOLDER}/SUBMIT_SONGS_BEFORE_${SONG_DEADLINE}.txt"
          
          # update filebrowser permissions - make samples read-only and allow uploads to songs folder
          curl -X POST http://filebrowser-service.filebrowser:44301/api/resources/share \
            -H "X-Auth: ${QUIXIT_USER}:${QUIXIT_PW}" \
            -d "{\"path\":\"/quixit/${SAMPLES_FOLDER}\",\"users\":[\"*\"],\"perm\":{\"admin\":false,\"execute\":false,\"create\":false,\"rename\":false,\"modify\":false,\"delete\":false,\"share\":false,\"download\":true}}"
          
          curl -X POST http://filebrowser-service.filebrowser:44301/api/resources/share \
            -H "X-Auth: ${QUIXIT_USER}:${QUIXIT_PW}" \
            -d "{\"path\":\"/quixit/${SONGS_FOLDER}\",\"users\":[\"*\"],\"perm\":{\"admin\":false,\"execute\":false,\"create\":true,\"rename\":false,\"modify\":false,\"delete\":false,\"share\":false,\"download\":true}}"
          
          # make sample pack downloadable
          curl -X POST http://filebrowser-service.filebrowser:44301/api/resources/share \
            -H "X-Auth: ${QUIXIT_USER}:${QUIXIT_PW}" \
            -d "{\"path\":\"/quixit/${QUIXIT_FOLDER}/SAMPLE_PACK.zip\",\"users\":[\"*\"],\"perm\":{\"admin\":false,\"execute\":false,\"create\":false,\"rename\":false,\"modify\":false,\"delete\":false,\"share\":false,\"download\":true}}"
          
          echo "Manually transitioned to songs phase for Quixit #${QUIXIT_NUMBER}"
        elif [ "$PHASE" = "finalize" ]; then
          # remove old phase file
          rm -f /data/quixit/${QUIXIT_FOLDER}/SUBMIT_SONGS_*.txt
          
          # create songs compilation zip
          cd /data/quixit
          zip -r "${QUIXIT_FOLDER}/ALL_SONGS.zip" "${QUIXIT_FOLDER}/songs"
          
          # finalize info file with descriptive name
          echo "This Quixit challenge is complete. All songs and samples are available for download." > "/data/quixit/${QUIXIT_FOLDER}/QUIXIT_COMPLETE_ARCHIVE_AVAILABLE.txt"
          
          # update filebrowser permissions - make everything read-only
          curl -X POST http://filebrowser-service.filebrowser:44301/api/resources/share \
            -H "X-Auth: ${QUIXIT_USER}:${QUIXIT_PW}" \
            -d "{\"path\":\"/quixit/${QUIXIT_FOLDER}\",\"users\":[\"*\"],\"perm\":{\"admin\":false,\"execute\":false,\"create\":false,\"rename\":false,\"modify\":false,\"delete\":false,\"share\":false,\"download\":true}}"
          
          # make songs zip downloadable
          curl -X POST http://filebrowser-service.filebrowser:44301/api/resources/share \
            -H "X-Auth: ${QUIXIT_USER}:${QUIXIT_PW}" \
            -d "{\"path\":\"/quixit/${QUIXIT_FOLDER}/ALL_SONGS.zip\",\"users\":[\"*\"],\"perm\":{\"admin\":false,\"execute\":false,\"create\":false,\"rename\":false,\"modify\":false,\"delete\":false,\"share\":false,\"download\":true}}"
          
          echo "Manually finalized Quixit #${QUIXIT_NUMBER}"
        elif [ "$PHASE" = "create_new" ]; then
          # create a new quixit with incremental number
          NEXT_NUMBER=$((QUIXIT_NUMBER + 1))
          
          # set variables for the new quixit
          QUIXIT_FOLDER="quixit-${NEXT_NUMBER}"
          SAMPLES_FOLDER="${QUIXIT_FOLDER}/samples"
          SONGS_FOLDER="${QUIXIT_FOLDER}/songs"
          SAMPLE_DEADLINE=$(date -d "+7 days" +%Y-%m-%d)
          
          # create directory structure
          mkdir -p /data/quixit/${QUIXIT_FOLDER}
          mkdir -p /data/quixit/${SAMPLES_FOLDER}
          mkdir -p /data/quixit/${SONGS_FOLDER}
          
          # create info files with descriptive names
          echo "Upload your audio samples to the samples folder. Deadline: ${SAMPLE_DEADLINE}" > "/data/quixit/${QUIXIT_FOLDER}/QUIXIT_HAS_BEGUN_UPLOAD_SAMPLES_BEFORE_${SAMPLE_DEADLINE}.txt"
          
          # update filebrowser permissions - allow uploads to samples folder
          curl -X POST http://filebrowser-service.filebrowser:44301/api/resources/share \
            -H "X-Auth: ${QUIXIT_USER}:${QUIXIT_PW}" \
            -d "{\"path\":\"/quixit/${SAMPLES_FOLDER}\",\"users\":[\"*\"],\"perm\":{\"admin\":false,\"execute\":false,\"create\":true,\"rename\":false,\"modify\":false,\"delete\":false,\"share\":false,\"download\":true}}"
          
          # make songs folder read-only during sample phase
          curl -X POST http://filebrowser-service.filebrowser:44301/api/resources/share \
            -H "X-Auth: ${QUIXIT_USER}:${QUIXIT_PW}" \
            -d "{\"path\":\"/quixit/${SONGS_FOLDER}\",\"users\":[\"*\"],\"perm\":{\"admin\":false,\"execute\":false,\"create\":false,\"rename\":false,\"modify\":false,\"delete\":false,\"share\":false,\"download\":true}}"
          
          # store the new quixit number
          echo "${NEXT_NUMBER}" > /data/quixit/current_quixit_number.txt
          
          echo "Manually created new Quixit #${NEXT_NUMBER}"
        else
          echo "Unknown phase: ${PHASE}. Valid options are 'samples_to_songs', 'finalize', or 'create_new'."
          exit 1
        fi
      env:
       - name: QUIXIT_USER
         valueFrom:
          secretKeyRef:
           name: quixit-admin-credentials
           key: admin-user
       - name: QUIXIT_PW
         valueFrom:
          secretKeyRef:
           name: quixit-admin-credentials
           key: admin-password
       - name: PHASE
         value: 'samples_to_songs' # Can be overridden when creating the job
   volumes:
    - name: filebrowser-data
      persistentVolumeClaim:
       claimName: filebrowser
   restartPolicy: OnFailure

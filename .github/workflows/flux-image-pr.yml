name: Create Image Update PR
on:
  push:
    branches:
      - flux-image-updates
concurrency:
  group: flux-image-pr
  cancel-in-progress: true
jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create image-update --description "Automated image updates" --color "0E8A16" --force
      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_pr=$(gh pr list --head flux-image-updates --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists, will be updated by push"
          else
            gh pr create \
              --title "chore(images): automated image updates" \
              --body "Automated image version bumps by Flux image-automation-controller." \
              --label "image-update" \
              --head flux-image-updates \
              --base main
          fi

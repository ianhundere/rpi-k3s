---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # helm repositories
  - sources/jetstack.yml
  - sources/nfs-subdir.yml
  - sources/csi-driver-nfs.yml
  - sources/tailscale.yml
  - sources/envoy-gateway-oci.yml
  # cert-manager
  - cert-manager/namespace.yml
  - cert-manager/release.yml
  - cert-manager/clusterissuer.yml
  - cert-manager/internal-ca.yml
  # metallb
  - metallb/namespace.yml
  - metallb/config.yml
  # envoy-gateway
  - envoy-gateway/namespace.yml
  - envoy-gateway/release.yml
  - envoy-gateway/gatewayclass.yml
  - envoy-gateway/envoyproxy.yml
  - envoy-gateway/gateway.yml
  - envoy-gateway/cronjob-rotate.yml
  # nfs-provisioner (deprecated; being migrated to csi-driver-nfs)
  - nfs-provisioner/namespace.yml
  - nfs-provisioner/video-storage.yml
  - nfs-provisioner/music-storage.yml
  - nfs-provisioner/config-storage.yml
  # csi-driver-nfs (maintained replacement; coexists during migration)
  - csi-driver-nfs/release.yml
  - csi-driver-nfs/storageclass-rpik3s.yml
  - csi-driver-nfs/storageclass-music.yml
  - csi-driver-nfs/storageclass-video.yml
  # image-automation
  - image-automation/imagerepositories.yml
  - image-automation/imagepolicies.yml
  - image-automation/imageupdateautomation.yml
  # system-upgrade-controller - uncomment when ready to upgrade k3s
  # - system-upgrade-controller/

---
# EnvoyProxy configures the data plane proxy pods.
# CRITICAL: Envoy proxy must run on amd64 — TCMalloc in upstream Envoy
# crashes on RPi4 ARM64 (39-bit VA space vs required 48-bit).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: proxy-config
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        container:
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
        pod:
          nodeSelector:
            kubernetes.io/arch: amd64

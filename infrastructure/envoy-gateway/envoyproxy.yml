---
# EnvoyProxy configures the data plane proxy pods.
# Note: RPi4 nodes recompiled with CONFIG_ARM64_VA_BITS_48=y (kernel 6.12.77-v8+)
# to support Envoy's TCMalloc. No architecture constraint needed.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: proxy-config
  namespace: envoy-gateway-system
spec:
  # Merge multiple Gateway resources (shared-gateway + internal-gateway) into
  # one Envoy deployment sharing the same MetalLB IP. Without this, each
  # Gateway would try to claim its own LoadBalancer IP and fight over ports.
  mergeGateways: true
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        container:
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            # Limit raised from 256Mi → 1Gi after a 33-day Envoy data-plane
            # crashloop traced to TCMalloc CHECK failure (exit 133) under
            # cgroup memory pressure. Fresh-pod baseline is ~50Mi but Envoy's
            # internal counters / connection pools / leaks grow over weeks; the
            # 256Mi ceiling left no headroom for TCMalloc arena expansion and
            # the allocator aborted rather than retried. 1Gi gives multi-month
            # headroom without crowding the amd64 worker node it lands on.
            limits:
              memory: "1Gi"
      envoyService:
        externalTrafficPolicy: Local
        # In merged-gateway mode, the per-Gateway `metallb` annotation on
        # shared-gateway metadata is ignored — EG creates a single Envoy
        # Service based on this EnvoyProxy spec, so the IP must be pinned
        # here to keep reusing METAL_LB_IP1 (no local DNS changes).
        annotations:
          metallb.universe.tf/loadBalancerIPs: ${METAL_LB_IP1}

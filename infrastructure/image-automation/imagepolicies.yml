---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: filebrowser
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: filebrowser
  # We run the `-stable-slim` variant (no ffmpeg) to avoid the preview
  # cache warnings on the RPi overlay FS. Strip the suffix so semver
  # ordering works, then track latest 1.x.
  filterTags:
    pattern: '^(?P<ver>[0-9]+\.[0-9]+\.[0-9]+)-stable-slim$'
    extract: '$ver'
  policy:
    semver:
      range: ">=1.0.0 <2.0.0"
